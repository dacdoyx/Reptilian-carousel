<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REPTILIAN</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
:root {
  --red:    #D42020;
  --green:  #4A5C2A;
  --silver: #C0C0C0;
  --dark:   #0a0a0a;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--dark);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  font-family: 'DM Mono', monospace;
}

/* ── NOISE ── */
body::after {
  content:'';
  position:fixed; inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
  pointer-events:none; z-index:999;
}

/* ════════════════════════════════
   LOADER
════════════════════════════════ */
#loader {
  position: fixed;
  inset: 0;
  background: var(--dark);
  z-index: 9999;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 32px;
}

.loader-word {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(52px, 14vw, 130px);
  letter-spacing: 8px;
  display: flex;
}

.loader-letter {
  display: inline-block;
  opacity: 0;
  transform: translateY(60px);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* each letter gets a colour from the palette */
.loader-letter:nth-child(1)  { background-image: linear-gradient(160deg,#ff6b35,#D42020); }
.loader-letter:nth-child(2)  { background-image: linear-gradient(160deg,#D42020,#8B0000); }
.loader-letter:nth-child(3)  { background-image: linear-gradient(160deg,#8B0000,#4A5C2A); }
.loader-letter:nth-child(4)  { background-image: linear-gradient(160deg,#4A5C2A,#6b7c3a); }
.loader-letter:nth-child(5)  { background-image: linear-gradient(160deg,#6b7c3a,#2a3318); }
.loader-letter:nth-child(6)  { background-image: linear-gradient(160deg,#888,#C0C0C0); }
.loader-letter:nth-child(7)  { background-image: linear-gradient(160deg,#C0C0C0,#e8e8e8); }
.loader-letter:nth-child(8)  { background-image: linear-gradient(160deg,#e8e8e8,#C0C0C0); }
.loader-letter:nth-child(9)  { background-image: linear-gradient(160deg,#C0C0C0,#888); }

.loader-bar-wrap {
  width: clamp(180px, 40vw, 320px);
  height: 2px;
  background: rgba(255,255,255,0.07);
  border-radius: 2px;
  overflow: hidden;
}
.loader-bar-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #D42020, #4A5C2A, #C0C0C0);
  border-radius: 2px;
}
.loader-pct {
  font-size: 11px;
  letter-spacing: 4px;
  color: rgba(255,255,255,0.25);
  text-transform: uppercase;
}

/* ════════════════════════════════
   MAIN
════════════════════════════════ */
#app {
  opacity: 0;
  width: 100%;
  max-width: 960px;
  padding: 40px 24px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
  position: relative;
}

/* ── TEXT STAGE ── */
.text-stage {
  position: relative;
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
}

.bg-word {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(72px, 17vw, 200px);
  letter-spacing: clamp(2px, 1vw, 14px);
  line-height: 1;
  text-transform: uppercase;
  text-align: center;
  width: 100%;
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  will-change: background-image;
  user-select: none;
  pointer-events: none;
}

/* ── CHARACTER ── */
.char-stage {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: clamp(200px, 38vw, 420px);
  pointer-events: none;
  z-index: 2;
}

.char-img {
  width: 100%;
  height: auto;
  display: block;
  mix-blend-mode: multiply;
  position: absolute;
  top: 0; left: 0;
}
.char-img:first-child { position: relative; }

/* ── ARROW BUTTONS ── */
.arrows {
  position: absolute;
  top: 50%;
  left: 0; right: 0;
  transform: translateY(-50%);
  display: flex;
  justify-content: space-between;
  padding: 0 clamp(4px, 2vw, 16px);
  pointer-events: none;
  z-index: 10;
}

.arrow-btn {
  pointer-events: all;
  width: clamp(40px, 6vw, 56px);
  height: clamp(40px, 6vw, 56px);
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.12);
  background: rgba(255,255,255,0.04);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: border-color .3s, background .3s;
  color: rgba(255,255,255,0.6);
  font-size: clamp(16px, 2.5vw, 22px);
  flex-shrink: 0;
}
.arrow-btn:hover {
  border-color: rgba(212,32,32,0.5);
  background: rgba(212,32,32,0.08);
  color: #ff6b35;
}
.arrow-btn:active { transform: scale(0.93); }

/* ── DOTS ── */
.dots {
  display: flex;
  gap: 8px;
  margin-top: clamp(10px, 2vw, 20px);
  z-index: 5;
  position: relative;
}
.dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: rgba(255,255,255,0.15);
  transition: background .4s, transform .4s;
  cursor: pointer;
}
.dot.active {
  background: #D42020;
  transform: scale(1.4);
}

/* ════════════════════════════════
   GLASS CARD
════════════════════════════════ */
.glass-card {
  position: relative;
  width: 100%;
  max-width: 560px;
  margin-top: clamp(18px, 3vw, 36px);
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.10);
  backdrop-filter: blur(32px);
  -webkit-backdrop-filter: blur(32px);
  border-radius: 6px;
  padding: clamp(24px, 4vw, 44px) clamp(24px, 5vw, 52px);
  overflow: hidden;
  z-index: 5;
}

/* accent top bar */
.glass-card::before {
  content:'';
  position:absolute;
  top:0; left:0; right:0;
  height: 2px;
  background: linear-gradient(90deg, var(--red), var(--green), var(--silver));
  transition: background .6s;
}
/* inner shimmer */
.glass-card::after {
  content:'';
  position:absolute;
  inset:0;
  background: linear-gradient(135deg,
    rgba(212,32,32,0.05) 0%,
    transparent 45%,
    rgba(74,92,42,0.04) 100%);
  pointer-events:none;
  border-radius: 6px;
}

/* card content */
.card-inner {
  position: relative;
  z-index: 2;
}

.card-tag {
  font-size: clamp(9px,1.2vw,11px);
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--red);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.card-tag::before {
  content:'';
  width:24px; height:1px;
  background: var(--red);
  flex-shrink:0;
  transition: background .6s;
}

.card-name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(30px, 5vw, 52px);
  letter-spacing: 3px;
  line-height: 1;
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  background-image: linear-gradient(135deg, #ff6b35, #D42020 45%, #8B0000);
  margin-bottom: 14px;
  transition: background-image .6s;
}

.card-divider {
  width:40px; height:1px;
  background: rgba(255,255,255,0.10);
  margin-bottom: 14px;
}

.card-desc {
  font-size: clamp(11px, 1.4vw, 13px);
  line-height: 1.85;
  color: rgba(242,240,235,0.5);
  margin-bottom: 22px;
  min-height: 60px;
}

.card-pills {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.pill {
  font-size: 9px;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 5px 12px;
  border-radius: 40px;
  border: 1px solid rgba(255,255,255,0.10);
  color: rgba(242,240,235,0.4);
  background: rgba(255,255,255,0.03);
  transition: border-color .4s, color .4s;
}
.pill.red    { border-color:rgba(212,32,32,0.4);   color:#D42020;  background:rgba(212,32,32,0.07); }
.pill.green  { border-color:rgba(74,92,42,0.5);    color:#7ea345;  background:rgba(74,92,42,0.08); }
.pill.silver { border-color:rgba(192,192,192,0.3); color:#aaa;     background:rgba(192,192,192,0.05); }

/* ── RESPONSIVE ── */
@media (max-width: 600px) {
  .glass-card { max-width:100%; }
  .char-stage { width: clamp(160px, 58vw, 280px); }
}
</style>
</head>
<body>

<!-- ══ LOADER ══ -->
<div id="loader">
  <div class="loader-word" id="loaderWord">
    <span class="loader-letter">R</span>
    <span class="loader-letter">E</span>
    <span class="loader-letter">P</span>
    <span class="loader-letter">T</span>
    <span class="loader-letter">I</span>
    <span class="loader-letter">L</span>
    <span class="loader-letter">I</span>
    <span class="loader-letter">A</span>
    <span class="loader-letter">N</span>
  </div>
  <div class="loader-bar-wrap">
    <div class="loader-bar-fill" id="loaderBar"></div>
  </div>
  <div class="loader-pct" id="loaderPct">0%</div>
</div>

<!-- ══ APP ══ -->
<div id="app">

  <!-- TEXT + CHARACTER -->
  <div class="text-stage" id="textStage">

    <!-- BG TEXT -->
    <div class="bg-word" id="bgWord">REPTILIAN</div>

    <!-- CHARACTER IMAGES -->
    <div class="char-stage" id="charStage">
      <img class="char-img" id="char0" src="reptilian.png"  alt="Reptilian 1">
      <img class="char-img" id="char1" src="reptilian3.png" alt="Reptilian 2" style="opacity:0">
      <img class="char-img" id="char2" src="reptilian2.png" alt="Reptilian 3" style="opacity:0">
    </div>

    <!-- ARROWS -->
    <div class="arrows">
      <button class="arrow-btn" id="btnPrev" aria-label="Previous">&#8592;</button>
      <button class="arrow-btn" id="btnNext" aria-label="Next">&#8594;</button>
    </div>
  </div>

  <!-- DOTS -->
  <div class="dots" id="dots">
    <div class="dot active" data-i="0"></div>
    <div class="dot"        data-i="1"></div>
    <div class="dot"        data-i="2"></div>
  </div>

  <!-- GLASS CARD -->
  <div class="glass-card" id="glassCard">
    <div class="card-inner">
      <div class="card-tag" id="cardTag">Character Profile</div>
      <div class="card-name" id="cardName">REPTILIAN — 01</div>
      <div class="card-divider"></div>
      <div class="card-desc" id="cardDesc">
        Street-hardened and scales of steel. Draped in red-black tactical gear,
        carrying heat and attitude in equal measure. Half dinosaur. All drip. Zero mercy.
      </div>
      <div class="card-pills" id="cardPills">
        <span class="pill red">Apex Predator</span>
        <span class="pill green">Urban Reptile</span>
        <span class="pill silver">Full Drip</span>
        <span class="pill">Tactical</span>
        <span class="pill">OG Status</span>
      </div>
    </div>
  </div>

</div><!-- /app -->

<script>
/* ════════════════════════════════
   DATA
════════════════════════════════ */
const CHARS = [
  {
    src: 'reptilian.png',
    name: 'REPTILIAN — 01',
    tag: 'Character Profile',
    desc: 'Street-hardened with scales of steel. Draped in red-black tactical gear, carrying heat and attitude in equal measure. Half dinosaur. All drip. Zero mercy.',
    pills: [
      {label:'Apex Predator',cls:'red'},
      {label:'Urban Reptile',cls:'green'},
      {label:'Full Drip',cls:'silver'},
      {label:'Tactical',cls:''},
      {label:'OG Status',cls:''},
    ],
    grad: 'linear-gradient(155deg,#ff6b35 0%,#D42020 35%,#8B0000 70%,#1a0000 100%)',
  },
  {
    src: 'reptilian3.png',
    name: 'REPTILIAN — 02',
    tag: 'Field Operative',
    desc: 'Velociraptor instincts meet street code. Hair down, trigger ready — she moves like smoke and hits like thunder. The deadliest silhouette in the block.',
    pills: [
      {label:'Velociraptor',cls:'green'},
      {label:'Ghost Mode',cls:'silver'},
      {label:'Street Code',cls:'red'},
      {label:'Operator',cls:''},
    ],
    grad: 'linear-gradient(155deg,#3d0000 0%,#8B0000 30%,#D42020 60%,#ff6b35 100%)',
  },
  {
    src: 'reptilian2.png',
    name: 'REPTILIAN — 03',
    tag: 'Squad Leader',
    desc: 'Lower, wider, unstoppable. The crouching predator who owns every angle. Skull chain swinging, piece locked — the whole block clears when he pulls up.',
    pills: [
      {label:'Squad Leader',cls:'red'},
      {label:'Heavy Hitter',cls:'silver'},
      {label:'Low Profile',cls:'green'},
      {label:'No Mercy',cls:''},
    ],
    grad: 'linear-gradient(155deg,#e8e8e8 0%,#C0C0C0 30%,#888 55%,#2a3318 100%)',
  },
];

/* ════════════════════════════════
   LOADER
════════════════════════════════ */
const letters  = document.querySelectorAll('.loader-letter');
const loaderBar= document.getElementById('loaderBar');
const loaderPct= document.getElementById('loaderPct');
const loader   = document.getElementById('loader');
const app      = document.getElementById('app');

// stagger letters in
gsap.to(letters, {
  opacity: 1,
  y: 0,
  duration: 0.6,
  stagger: 0.07,
  ease: 'power3.out',
  delay: 0.2,
});

// progress bar
const prog = { val: 0 };
gsap.to(prog, {
  val: 100,
  duration: 1.8,
  ease: 'power2.inOut',
  delay: 0.5,
  onUpdate() {
    const v = Math.round(prog.val);
    loaderBar.style.width = v + '%';
    loaderPct.textContent = v + '%';
  },
  onComplete() {
    // exit loader
    gsap.to(letters, {
      opacity: 0,
      y: -50,
      duration: 0.5,
      stagger: 0.04,
      ease: 'power3.in',
    });
    gsap.to(loader, {
      opacity: 0,
      duration: 0.6,
      delay: 0.55,
      onComplete() {
        loader.style.display = 'none';
        enterApp();
      }
    });
  }
});

/* ════════════════════════════════
   ENTER APP
════════════════════════════════ */
function enterApp() {
  gsap.to(app, { opacity: 1, duration: 0.6, ease: 'power2.out' });
  gsap.from('#bgWord', { scaleX: 0.6, opacity: 0, duration: 1, ease: 'power4.out' });
  gsap.from('#charStage', { y: 60, opacity: 0, duration: 1, delay: 0.2, ease: 'power3.out' });
  gsap.from('#glassCard', { y: 50, opacity: 0, duration: 1, delay: 0.35, ease: 'power3.out' });
  gsap.from('.dots', { opacity: 0, duration: 0.6, delay: 0.5 });
  floatLoop();
  gradLoop();
}

/* ── Float character ── */
function floatLoop() {
  gsap.to('#charStage', {
    y: -14,
    duration: 2.8,
    ease: 'sine.inOut',
    yoyo: true,
    repeat: -1,
  });
}

/* ── Animated gradient on text ── */
let gt = 0;
const bgWord = document.getElementById('bgWord');
function gradLoop() {
  gt += 0.003;
  const a = (Math.sin(gt) * 22 + 155).toFixed(1);
  const p = (Math.sin(gt * 0.65) * 14 + 50).toFixed(1);
  bgWord.style.backgroundImage =
    `linear-gradient(${a}deg,#ff6b35 0%,#D42020 ${p}%,#4A5C2A ${+p+18}%,#C0C0C0 85%,#333 100%)`;
  requestAnimationFrame(gradLoop);
}

/* ════════════════════════════════
   CHARACTER SWITCHER
════════════════════════════════ */
let current = 0;
let busy    = false;

const charImgs = [
  document.getElementById('char0'),
  document.getElementById('char1'),
  document.getElementById('char2'),
];
const dotEls    = document.querySelectorAll('.dot');
const cardName  = document.getElementById('cardName');
const cardTag   = document.getElementById('cardTag');
const cardDesc  = document.getElementById('cardDesc');
const cardPills = document.getElementById('cardPills');
const glassCard = document.getElementById('glassCard');

function switchTo(next, dir) {
  if (busy || next === current) return;
  busy = true;

  const prev = current;
  current = next;
  const data = CHARS[current];

  // ── outgoing char: slide + fade
  gsap.to(charImgs[prev], {
    x: dir * -80,
    opacity: 0,
    scale: 0.88,
    duration: 0.45,
    ease: 'power3.in',
  });

  // ── incoming char: slide in
  gsap.fromTo(charImgs[current],
    { x: dir * 100, opacity: 0, scale: 0.9 },
    {
      x: 0, opacity: 1, scale: 1,
      duration: 0.55,
      ease: 'power3.out',
      delay: 0.25,
      onComplete() {
        // reset prev
        gsap.set(charImgs[prev], { x: 0, scale: 1 });
        busy = false;
      }
    }
  );

  // ── card flip-out / flip-in
  gsap.to(glassCard, {
    rotateY: dir * -12,
    y: 16,
    opacity: 0,
    scale: 0.96,
    duration: 0.3,
    ease: 'power2.in',
    onComplete() {
      // swap content
      cardName.textContent  = data.name;
      cardTag.textContent   = data.tag;
      cardDesc.textContent  = data.desc;
      cardPills.innerHTML   = data.pills.map(p =>
        `<span class="pill ${p.cls}">${p.label}</span>`
      ).join('');

      gsap.to(glassCard, {
        rotateY: 0,
        y: 0,
        opacity: 1,
        scale: 1,
        duration: 0.5,
        ease: 'power3.out',
      });
    }
  });

  // ── bg text zoom pulse
  gsap.fromTo(bgWord,
    { scale: 1.06 },
    { scale: 1, duration: 0.5, ease: 'power3.out' }
  );

  // ── dots
  dotEls.forEach((d, i) => d.classList.toggle('active', i === current));
}

document.getElementById('btnPrev').addEventListener('click', () => {
  const next = (current - 1 + CHARS.length) % CHARS.length;
  switchTo(next, -1);
});
document.getElementById('btnNext').addEventListener('click', () => {
  const next = (current + 1) % CHARS.length;
  switchTo(next, 1);
});
dotEls.forEach(d => {
  d.addEventListener('click', () => {
    const next = +d.dataset.i;
    switchTo(next, next > current ? 1 : -1);
  });
});

/* ── touch/swipe support ── */
let tx0 = null;
document.addEventListener('touchstart', e => { tx0 = e.touches[0].clientX; }, {passive:true});
document.addEventListener('touchend', e => {
  if (tx0 === null) return;
  const dx = e.changedTouches[0].clientX - tx0;
  if (Math.abs(dx) > 40) {
    const next = dx < 0
      ? (current + 1) % CHARS.length
      : (current - 1 + CHARS.length) % CHARS.length;
    switchTo(next, dx < 0 ? 1 : -1);
  }
  tx0 = null;
});
</script>
</body>
</html>
